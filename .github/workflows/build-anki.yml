name: Build Anki decks

on:
  push:
    paths:
      - "cards/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/build-anki.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Validate and build .apkg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test builder
        run: pytest

      - name: Validate cards
        run: cards-adhs-build validate --cards-dir cards

      - name: Build Anki packages
        run: cards-adhs-build build --cards-dir cards --out-dir dist

      - name: Verify APKG artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          files = sorted(Path("dist").glob("*.apkg"))
          if not files:
              raise SystemExit("No .apkg files were produced.")

          for path in files:
              size = path.stat().st_size
              if size < 1024:
                  raise SystemExit(f"{path} is suspiciously small ({size} bytes).")
              print(f"{path} ({size} bytes)")
          PY

      - name: Commit APKG files to dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/*.apkg

          if git diff --cached --quiet; then
            echo "dist/*.apkg is already current."
          else
            git commit -m "Update generated APKG decks [skip ci]"
            git push origin HEAD:main
          fi

      - name: Publish APKG release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="cards-adhs-latest"
          title="Cards_ADHS latest APKG decks"
          target="$(git rev-parse HEAD)"
          notes_file="$(mktemp)"

          {
            echo "Automatisch gebaut aus Commit ${target}."
            echo
            echo "APKG-Dateien:"
            for path in dist/*.apkg; do
              echo "- $(basename "$path")"
            done
          } > "$notes_file"

          git tag -f "$tag" "$target"
          git push -f origin "refs/tags/$tag"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes_file" --target "$target" --latest
          else
            gh release create "$tag" --title "$title" --notes-file "$notes_file" --target "$target" --latest
          fi

          gh release upload "$tag" dist/*.apkg --clobber

      - name: Upload APKG artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Cards_ADHS_apkg
          path: dist/*.apkg
          if-no-files-found: error
          retention-days: 30
